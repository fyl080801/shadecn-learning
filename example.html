<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sphere Tracker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0a0a0f;
        overflow: hidden;
        font-family: "DM Mono", monospace;
        user-select: none;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      #hud {
        position: absolute;
        top: 32px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 48px;
        color: #3a3a4a;
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      #hud .val {
        color: #7c6fff;
      }
      #hud .val.front {
        color: #5dffa0;
      }
      #hud .val.back {
        color: #ff6b6b;
      }
      #hud .sep {
        color: #1e1e2a;
      }
      #canvas-wrap {
        width: min(88vw, 88vh);
        height: min(88vw, 88vh);
        position: relative;
        cursor: grab;
        touch-action: none;
      }
      #canvas-wrap.dragging {
        cursor: grabbing;
      }
      #footer {
        position: absolute;
        bottom: 28px;
        color: #252530;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <span>θ <span id="h-theta" class="val">—</span></span>
        <span class="sep">·</span>
        <span>φ <span id="h-phi" class="val">—</span></span>
        <span class="sep">·</span>
        <span>z <span id="h-z" class="val">—</span></span>
      </div>

      <div id="canvas-wrap">
        <svg
          id="svg"
          style="position: absolute; inset: 0; overflow: visible"
        ></svg>
      </div>

      <div id="footer">drag to orbit</div>
    </div>

    <script>
      // ─────────────────────────────────────────────
      //  坐标系（右手，y朝上，z朝向观察者）
      //  x = R·sin(phi)·sin(theta)
      //  y = R·cos(phi)
      //  z = R·sin(phi)·cos(theta)   ← z正 = 朝观察者
      //
      //  透视投影（观察者在 z=+P 处往 -z 看）：
      //  scale = P / (P - z)
      //  px = cx + x·scale
      //  py = cy - y·scale            ← 屏幕y轴翻转
      // ─────────────────────────────────────────────

      const PERSP = 700
      const svg = document.getElementById("svg")
      const wrap = document.getElementById("canvas-wrap")

      let W, H, cx, cy, sq, R, outR
      let theta = Math.PI * 0.35
      let phi = Math.PI / 2.2
      let dragging = false,
        dragX = 0,
        dragY = 0

      // SVG util
      function ns(tag, a = {}) {
        const e = document.createElementNS("http://www.w3.org/2000/svg", tag)
        for (const [k, v] of Object.entries(a)) e.setAttribute(k, v)
        return e
      }
      function sa(e, a) {
        for (const [k, v] of Object.entries(a)) e.setAttribute(k, v)
      }

      // ── 投影 ──────────────────────────────────────
      function proj(x, y, z) {
        const s = PERSP / (PERSP - z) // z正=近，scale>1
        return { x: cx + x * s, y: cy - y * s, z, s }
      }

      // ── 球面坐标 → 3D ─────────────────────────────
      function sph(r, th, ph) {
        return {
          x: r * Math.sin(ph) * Math.sin(th),
          y: r * Math.cos(ph),
          z: r * Math.sin(ph) * Math.cos(th)
        }
      }

      // ── 线段深度分流 ───────────────────────────────
      // 将 3D 点列分为「前面实线」和「后面虚线」两段路径
      function splitPaths(pts3D) {
        const p = pts3D.map((q) => proj(q.x, q.y, q.z))
        let front = "",
          back = ""
        for (let i = 0; i < p.length - 1; i++) {
          const a = p[i],
            b = p[i + 1]
          const seg = `M${a.x.toFixed(1)} ${a.y.toFixed(1)}L${b.x.toFixed(1)} ${b.y.toFixed(1)} `
          // z > 0 → 在观察者一侧（前面）
          if (a.z >= 0 || b.z >= 0) front += seg
          else back += seg
        }
        return { front, back }
      }

      // ── 生成经线点（完整大圆，沿纬度遍历）──────────
      function lonPoints(lon, steps = 72) {
        return Array.from({ length: steps + 1 }, (_, i) => {
          const lat = (Math.PI * i) / steps
          return sph(R, lon, lat)
        })
      }

      // ── 生成纬线点（完整小圆，沿经度遍历）──────────
      function latPoints(lat, steps = 72) {
        return Array.from({ length: steps + 1 }, (_, i) => {
          const lon = (2 * Math.PI * i) / steps
          return sph(R, lon, lat)
        })
      }

      // ── DOM 节点池（一次创建，每帧更新 d/属性）──────
      let N = null // nodes

      function buildDOM() {
        svg.innerHTML = ""

        // defs
        const defs = ns("defs")
        defs.innerHTML = `
    <radialGradient id="sg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c6fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7c6fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="fg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fd" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`
        svg.appendChild(defs)

        const glowFill = ns("circle", { fill: "url(#sg)" })
        svg.appendChild(glowFill)

        // 经线 × 6（均匀分布 0~π，每条是完整大圆）
        // 纬线 × 5（均匀分布球面）
        // 各自前/后两条 path
        const LON = 6,
          LAT = 5
        const backLon = [],
          frontLon = []
        const backLat = [],
          frontLat = []

        for (let i = 0; i < LON; i++) {
          const b = ns("path", {
            fill: "none",
            stroke: "#7c6fff",
            "stroke-width": "0.6",
            "stroke-opacity": "0.14",
            "stroke-dasharray": "2 5"
          })
          const f = ns("path", {
            fill: "none",
            stroke: "#7c6fff",
            "stroke-width": "0.85",
            "stroke-opacity": "0.30"
          })
          svg.appendChild(b)
          svg.appendChild(f)
          backLon.push(b)
          frontLon.push(f)
        }
        for (let i = 0; i < LAT; i++) {
          const b = ns("path", {
            fill: "none",
            stroke: "#7c6fff",
            "stroke-width": "0.6",
            "stroke-opacity": "0.14",
            "stroke-dasharray": "2 5"
          })
          const f = ns("path", {
            fill: "none",
            stroke: "#7c6fff",
            "stroke-width": "0.85",
            "stroke-opacity": "0.30"
          })
          svg.appendChild(b)
          svg.appendChild(f)
          backLat.push(b)
          frontLat.push(f)
        }

        // 轮廓圆（前景层）
        const outline = ns("circle", {
          fill: "none",
          stroke: "#7c6fff",
          "stroke-width": "1.2",
          "stroke-opacity": "0.45"
        })
        svg.appendChild(outline)

        // 方框 + 十字
        const square = ns("rect", {
          fill: "rgba(124,111,255,0.035)",
          stroke: "#7c6fff",
          "stroke-width": "1",
          "stroke-opacity": "0.4",
          "stroke-dasharray": "4 3"
        })
        const crossH = ns("line", {
          stroke: "#7c6fff",
          "stroke-width": "0.5",
          "stroke-opacity": "0.2",
          "stroke-dasharray": "4 4"
        })
        const crossV = ns("line", {
          stroke: "#7c6fff",
          "stroke-width": "0.5",
          "stroke-opacity": "0.2",
          "stroke-dasharray": "4 4"
        })
        svg.appendChild(square)
        svg.appendChild(crossH)
        svg.appendChild(crossV)

        // 角点连线 × 4
        const cLines = Array.from({ length: 4 }, () => {
          const l = ns("line", { "stroke-width": "1" })
          svg.appendChild(l)
          return l
        })
        // 角点圆 × 4
        const cDots = Array.from({ length: 4 }, () => {
          const c = ns("circle", {
            r: "3",
            fill: "#7c6fff",
            "fill-opacity": "0.85"
          })
          svg.appendChild(c)
          return c
        })

        // 光晕 + 主点 + 点中心
        const halo = ns("circle", {
          fill: "none",
          "stroke-width": "1",
          filter: "url(#fg)"
        })
        const dot = ns("circle", { filter: "url(#fd)" })
        const dotCenter = ns("circle", { fill: "white" })
        svg.appendChild(halo)
        svg.appendChild(dot)
        svg.appendChild(dotCenter)

        N = {
          glowFill,
          backLon,
          frontLon,
          backLat,
          frontLat,
          outline,
          square,
          crossH,
          crossV,
          cLines,
          cDots,
          halo,
          dot,
          dotCenter
        }
      }

      // ── 每帧渲染 ───────────────────────────────────
      function render() {
        if (!N) return

        // 当前拖动点
        const p3 = sph(R, theta, phi)
        const pt = proj(p3.x, p3.y, p3.z)
        const depthT = (p3.z + R) / (2 * R) // [0,1]  0=后 1=前
        const dotColor = depthT > 0.5 ? "#5dffa0" : "#ff6b6b"
        const lineOp = (0.2 + depthT * 0.68).toFixed(3)
        const dotOp = (0.35 + depthT * 0.65).toFixed(3)
        const pR = sq * 0.068

        // HUD
        document.getElementById("h-theta").textContent =
          ((theta * 180) / Math.PI).toFixed(1) + "°"
        document.getElementById("h-phi").textContent =
          ((phi * 180) / Math.PI).toFixed(1) + "°"
        const hz = document.getElementById("h-z")
        hz.textContent = p3.z.toFixed(1)
        hz.className = "val " + (depthT > 0.5 ? "front" : "back")

        // 球体辉光
        sa(N.glowFill, { cx, cy, r: outR })

        // 经线（6条，每条完整大圆，lon 间隔 π/6 = 30°）
        for (let i = 0; i < 6; i++) {
          const lon = (Math.PI * i) / 6
          const { front, back } = splitPaths(lonPoints(lon))
          sa(N.frontLon[i], { d: front || "M0 0" })
          sa(N.backLon[i], { d: back || "M0 0" })
        }

        // 纬线（5条，phi 间隔 π/6 ≈ 30°，排除极点）
        for (let i = 0; i < 5; i++) {
          const lat = (Math.PI * (i + 1)) / 6
          const { front, back } = splitPaths(latPoints(lat))
          sa(N.frontLat[i], { d: front || "M0 0" })
          sa(N.backLat[i], { d: back || "M0 0" })
        }

        // 轮廓圆：透视下球体轮廓半径 = R·P/√(P²-R²)
        sa(N.outline, { cx, cy, r: outR })

        // 方框
        sa(N.square, { x: cx - sq / 2, y: cy - sq / 2, width: sq, height: sq })
        sa(N.crossH, { x1: cx - sq / 2, y1: cy, x2: cx + sq / 2, y2: cy })
        sa(N.crossV, { x1: cx, y1: cy - sq / 2, x2: cx, y2: cy + sq / 2 })

        // 角点
        const corners = [
          { x: cx - sq / 2, y: cy - sq / 2 },
          { x: cx + sq / 2, y: cy - sq / 2 },
          { x: cx - sq / 2, y: cy + sq / 2 },
          { x: cx + sq / 2, y: cy + sq / 2 }
        ]
        for (let i = 0; i < 4; i++) {
          const c = corners[i]
          sa(N.cLines[i], {
            x1: c.x,
            y1: c.y,
            x2: pt.x,
            y2: pt.y,
            stroke: dotColor,
            "stroke-opacity": lineOp
          })
          sa(N.cDots[i], { cx: c.x, cy: c.y })
        }

        // 光晕
        sa(N.halo, {
          cx: pt.x,
          cy: pt.y,
          r: pR * 2.5,
          stroke: dotColor,
          "stroke-opacity": (dotOp * 0.28).toFixed(3)
        })

        // 主点
        sa(N.dot, {
          cx: pt.x,
          cy: pt.y,
          r: pR,
          fill: dotColor,
          "fill-opacity": dotOp
        })
        sa(N.dotCenter, {
          cx: pt.x,
          cy: pt.y,
          r: pR * 0.4,
          "fill-opacity": (parseFloat(dotOp) * 0.9).toFixed(3)
        })
      }

      // ── 尺寸更新 ───────────────────────────────────
      function layout() {
        const rect = wrap.getBoundingClientRect()
        W = rect.width
        H = rect.height
        cx = W / 2
        cy = H / 2
        sq = Math.min(W, H) * 0.32
        R = (sq * Math.sqrt(3)) / 2 + sq * 0.28
        // 透视下轮廓圆半径（严格公式）
        outR = (R * PERSP) / Math.sqrt(PERSP * PERSP - R * R)
        svg.setAttribute("width", W)
        svg.setAttribute("height", H)
        buildDOM()
        render()
      }

      // ── 交互事件 ───────────────────────────────────
      wrap.addEventListener("pointerdown", (e) => {
        dragging = true
        dragX = e.clientX
        dragY = e.clientY
        wrap.setPointerCapture(e.pointerId)
        wrap.classList.add("dragging")
      })
      wrap.addEventListener("pointermove", (e) => {
        if (!dragging) return
        const dx = e.clientX - dragX
        const dy = e.clientY - dragY
        dragX = e.clientX
        dragY = e.clientY
        theta =
          (((theta + dx * 0.006) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI)
        phi = Math.max(0.05, Math.min(Math.PI - 0.05, phi - dy * 0.006))
        render()
      })
      wrap.addEventListener("pointerup", () => {
        dragging = false
        wrap.classList.remove("dragging")
      })
      wrap.addEventListener("pointercancel", () => {
        dragging = false
        wrap.classList.remove("dragging")
      })

      window.addEventListener("resize", layout)
      layout()
    </script>
  </body>
</html>
